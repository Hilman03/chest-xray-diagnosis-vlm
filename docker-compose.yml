version: "3.9"

services:

  # ── MongoDB ────────────────────────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: cxr-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: cxr_pacs

  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cxr-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - hf_cache:/app/.cache/huggingface
    environment:
      MONGODB_URI: mongodb://mongodb:27017/cxr_pacs
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Streamlit Frontend ─────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cxr-frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  mongo_data:
  hf_cache:
